<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>魔石神域探索ハクスラ v4.0</title><link rel="stylesheet" href="style.css"></head>
<body><header class="top"><div><h1>魔石神域探索ハクスラ v4.0</h1><p>パーティ編成 / 種族・職業・二つ名 / 放置探索 / 鑑定 / 神域ボス / 魔石インフレ</p></div><div class="topBtns"><button id="saveBtn">保存</button><button id="loadBtn">読込</button><button id="resetBtn">初期化</button></div></header>
<main><section class="hero"><div class="bossStage"><img id="mainBossImg" src="" alt=""><div class="bossShade"></div><div class="bossCaption"><b id="mainBossName">神域探索</b><span id="mainBossInfo">準備して探索へ送り出せ</span></div></div><div class="hud"><div><b>階層</b><span id="floorText">1</span></div><div><b>戦力</b><span id="powerText">0</span></div><div><b>Gold</b><span id="goldText">0</span></div><div><b>魔石</b><span id="stoneText">0</span></div><div><b>未鑑定</b><span id="lootText">0</span></div></div></section>
<nav class="tabs"><button class="tab active" data-tab="explore">探索</button><button class="tab" data-tab="party">編成</button><button class="tab" data-tab="equip">装備</button><button class="tab" data-tab="loot">鑑定</button><button class="tab" data-tab="boss">神域ボス</button><button class="tab" data-tab="codex">図鑑</button></nav>
<section id="explore" class="panel active"><div class="grid2"><div class="card"><h2>探索先</h2><select id="dungeonSelect"></select><div class="actions"><button id="startBtn">探索開始</button><button id="stopBtn">停止</button><button id="stepBtn">1戦だけ</button></div><div id="dungeonInfo"></div></div><div class="card"><h2>探索ログ</h2><div id="log" class="log"></div></div></div></section>
<section id="party" class="panel"><div id="partyPanel"></div></section>
<section id="equip" class="panel"><div class="toolbar"><select id="memberSelect"></select><select id="slotSelect"><option value="weapon">武器</option><option value="armor">防具</option><option value="acc">装飾</option><option value="relic">遺物</option></select><select id="filterSelect"><option value="owned">所持</option><option value="all">全装備</option><option value="shop">購入可能</option><option value="boss">ボス装備</option></select></div><div id="equipPanel"></div></section>
<section id="loot" class="panel"><div class="card"><h2>未鑑定品</h2><div class="actions"><button id="identifyOne">1個鑑定</button><button id="identifyAll">全部鑑定</button><button id="sellJunk">低Tier売却</button></div></div><div id="lootPanel"></div></section>
<section id="boss" class="panel"><div id="bossPanel"></div></section>
<section id="codex" class="panel"><div id="codexPanel"></div></section></main><script src="game.js"></script></body></html>
