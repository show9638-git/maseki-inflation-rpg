<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#090b14">
  <title>魔石インフレーションRPG Mobile</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="app">
  <header class="topbar">
    <div>
      <h1>魔石インフレーションRPG</h1>
      <p>スマホ対応版 / 場所選択式コマンドバトル</p>
    </div>
    <div class="top-actions">
      <button id="saveBtn" class="mini">保存</button>
      <button id="loadBtn" class="mini">読込</button>
      <button id="resetBtn" class="mini danger">初期化</button>
    </div>
  </header>

  <section class="status-strip">
    <div><span>Lv</span><strong id="stripLevel">1</strong></div>
    <div><span>G</span><strong id="stripMoney">0</strong></div>
    <div><span>魔石</span><strong id="stripStones">0</strong></div>
    <div><span>場所</span><strong id="stripLocation">草原</strong></div>
  </section>

  <nav class="tabs">
    <button class="tab active" data-tab="battle">戦闘</button>
    <button class="tab" data-tab="places">場所</button>
    <button class="tab" data-tab="growth">育成</button>
    <button class="tab" data-tab="shop">装備</button>
    <button class="tab" data-tab="party">仲間</button>
  </nav>

  <main>
    <section id="battleTab" class="tab-page active">
      <div id="scene" class="scene">
        <div>
          <h2 id="sceneName">はじまりの草原</h2>
          <p id="sceneText">弱い魔物が出る。育成の起点。</p>
        </div>
      </div>

      <div class="battle-grid">
        <article class="unit">
          <div class="portrait hero-portrait">白黒虹</div>
          <h3 id="heroName">主人公</h3>
          <div id="heroBars"></div>
          <div id="heroStats" class="mini-list"></div>
        </article>

        <article class="unit">
          <div id="enemyPortrait" class="portrait enemy-portrait">敵</div>
          <h3 id="enemyName">敵</h3>
          <div id="enemyBars"></div>
          <div id="enemyStats" class="mini-list"></div>
        </article>
      </div>

      <div class="command-pad">
        <button id="attackBtn">攻撃</button>
        <button id="skill1Btn">虹斬り</button>
        <button id="skill2Btn">習得技</button>
        <button id="healBtn">回復薬</button>
        <button id="absorbBtn">魔石吸収</button>
        <button id="nextBtn">次の敵</button>
      </div>

      <section class="log-box">
        <div class="log-title">ログ</div>
        <div id="log" class="log"></div>
      </section>
    </section>

    <section id="placesTab" class="tab-page">
      <h2>場所選択</h2>
      <div id="locationList" class="card-list"></div>
    </section>

    <section id="growthTab" class="tab-page">
      <h2>ステータス</h2>
      <div id="stats" class="data-card"></div>
      <h2>技</h2>
      <div id="skills" class="data-card"></div>
      <h2>素材</h2>
      <div id="materials" class="data-card"></div>
      <h2>クエスト</h2>
      <div id="quests" class="card-list"></div>
    </section>

    <section id="shopTab" class="tab-page">
      <h2>魔石換金</h2>
      <div class="card">
        <p>魔石1個 = 8G。吸収すると永続強化、売ると装備資金。</p>
        <div class="inline-buttons">
          <button data-sell="10">10個売る</button>
          <button data-sell="100">100個売る</button>
          <button data-sell="all">全部売る</button>
        </div>
      </div>
      <h2>商店</h2>
      <div id="shopItems" class="card-list"></div>
      <h2>鍛冶・錬成</h2>
      <div id="craftItems" class="card-list"></div>
    </section>

    <section id="partyTab" class="tab-page">
      <h2>装備中</h2>
      <div id="equipment" class="data-card"></div>
      <h2>仲間</h2>
      <div id="partyList" class="card-list"></div>
    </section>
  </main>
</div>

<div id="toast" class="toast hidden"></div>
<script src="./game.js"></script>
</body>
</html>
