<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>魔石転生サバイバー v0.1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <section id="screenTitle" class="screen active">
      <div class="titleBox">
        <h1>魔石転生サバイバー</h1>
        <p>ヴァンサバ風 × 種族ビルド × 見た目進化 × 転生強化</p>
        <div class="menuGrid">
          <button id="toRaceBtn" type="button">出撃準備</button>
          <button id="toRebirthBtn" type="button">転生強化</button>
          <button id="toRecordsBtn" type="button">記録</button>
        </div>
        <div class="statusCard">
          <b>所持転生ポイント</b><span id="metaPointTitle">0</span>
          <b>最高スコア</b><span id="bestScoreTitle">0</span>
        </div>
      </div>
    </section>
    <section id="screenRace" class="screen">
      <header class="screenHeader"><button class="backTitle" type="button">戻る</button><h2>種族選択</h2></header>
      <div id="raceList" class="cardGrid"></div>
      <div class="bottomBar"><button id="startGameBtn" type="button">この種族で出撃</button></div>
    </section>
    <section id="screenRebirth" class="screen">
      <header class="screenHeader"><button class="backTitle" type="button">戻る</button><h2>転生強化</h2></header>
      <div class="pointPanel">転生ポイント：<b id="metaPointText">0</b></div>
      <div id="upgradeList" class="cardGrid"></div>
    </section>
    <section id="screenRecords" class="screen">
      <header class="screenHeader"><button class="backTitle" type="button">戻る</button><h2>記録</h2></header>
      <div id="recordPanel" class="records"></div>
    </section>
    <section id="screenGame" class="screen gameScreen">
      <canvas id="gameCanvas"></canvas>
      <div class="hud"><div><b>TIME</b><span id="hudTime">0:00</span></div><div><b>LV</b><span id="hudLevel">1</span></div><div><b>KILL</b><span id="hudKills">0</span></div><div><b>SCORE</b><span id="hudScore">0</span></div></div>
      <div class="hpWrap"><div id="hpBar"></div></div><div class="xpWrap"><div id="xpBar"></div></div>
      <div id="skillHud" class="skillHud"></div><div id="evoText" class="evoText hidden"></div>
      <div id="stickZone"><div id="stickBase"><div id="stickKnob"></div></div></div>
      <button id="pauseBtn" type="button">II</button>
    </section>
    <section id="screenLevelUp" class="screen overlay"><div class="modal"><h2>レベルアップ</h2><p>スキルを選択</p><div id="levelChoices" class="choiceGrid"></div></div></section>
    <section id="screenResult" class="screen overlay"><div class="modal"><h2>死亡</h2><div id="resultPanel"></div><button id="backAfterDeathBtn" type="button">タイトルへ戻る</button></div></section>
    <div id="errorBox" class="errorBox hidden"></div>
  </div>
  <script src="game.js"></script>
</body></html>
