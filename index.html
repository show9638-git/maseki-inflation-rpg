<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>魔石転生サバイバー v0.4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <section id="title" class="screen active">
    <div class="box">
      <h1>魔石転生サバイバー v0.4</h1>
      <p>敵インフレ強化 / スキル40種 / レベル選択3秒 / ガチャ500種</p>
      <div class="stats">
        <div><b>転生pt</b><span id="metaPts">0</span></div>
        <div><b>Gold</b><span id="goldText">0</span></div>
        <div><b>最高スコア</b><span id="bestScore">0</span></div>
        <div><b>音</b><span id="soundText">ON</span></div>
      </div>
      <button id="goRace" type="button">出撃準備</button>
      <button id="goGacha" type="button">ガチャ / 所持品</button>
      <button id="goUpgrades" type="button">転生強化</button>
      <button id="toggleSound" type="button">音 ON/OFF</button>
      <button id="resetSave" type="button">保存初期化</button>
    </div>
  </section>
  <section id="race" class="screen">
    <header><button class="back" type="button">戻る</button><h2>種族選択</h2></header>
    <div id="raceCards" class="cards"></div>
    <button id="start" class="fixedBtn" type="button">出撃</button>
  </section>
  <section id="gacha" class="screen">
    <header><button class="back" type="button">戻る</button><h2>ガチャ / 所持品</h2></header>
    <div class="point">Gold：<b id="goldGacha">0</b></div>
    <p>スキン0.1% / UR0.5% / SSR1% / SR10% / R20% / 残りN</p>
    <div class="gachaBtns">
      <button id="roll1" type="button">1回 100G</button>
      <button id="roll10" type="button">10回 1000G</button>
      <button id="roll100" type="button">100回 10000G</button>
    </div>
    <div id="gachaResult" class="resultMini"></div>
    <h2>所持装備・スキン</h2>
    <div id="inventoryCards" class="cards"></div>
  </section>
  <section id="upgrades" class="screen">
    <header><button class="back" type="button">戻る</button><h2>転生強化</h2></header>
    <div class="point">所持転生pt：<b id="ptsText">0</b></div>
    <div id="upgradeCards" class="cards"></div>
  </section>
  <section id="game" class="screen game">
    <canvas id="cv"></canvas>
    <div class="hud">
      <div><b>TIME</b><span id="time">0:00</span></div>
      <div><b>LV</b><span id="lv">1</span></div>
      <div><b>KILL</b><span id="kills">0</span></div>
      <div><b>SCORE</b><span id="score">0</span></div>
      <div><b>GOLD</b><span id="runGold">0</span></div>
    </div>
    <div class="hp"><i id="hpbar"></i></div>
    <div class="xp"><i id="xpbar"></i></div>
    <div id="skills" class="skills"></div>
    <div id="touchHint">押している方向へ移動。離すと即停止。</div>
    <button id="pause" type="button">II</button>
  </section>
  <section id="levelup" class="overlay">
    <div class="modal">
      <h2>レベルアップ <span id="choiceTimer">3.0</span></h2>
      <p>3秒以内に選択。未選択ならランダム取得。</p>
      <div id="choices" class="choices"></div>
    </div>
  </section>
  <section id="result" class="overlay">
    <div class="modal">
      <h2>リザルト</h2>
      <div id="resultText"></div>
      <button id="backTitle" type="button">タイトルへ</button>
    </div>
  </section>
  <div id="err" class="err hidden"></div>
</div>
<script src="game.js"></script>
</body>
</html>
