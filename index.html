<!doctype html><html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>魔石転生サバイバー v0.12.1</title><link rel="stylesheet" href="style.css"></head><body>
<div id="app">
<section id="title" class="screen active"><div class="box"><h1>魔石転生サバイバー v0.12.1</h1>
<p>黒マップ廃止 / 方向別歩行 / 見やすい神殿マップ / 敵壁判定</p>
<div class="stats"><div><b>転生pt</b><span id="pts">0</span></div><div><b>Gold</b><span id="gold">0</span></div><div><b>最高スコア</b><span id="best">0</span></div><div><b>音</b><span id="sound">ON</span></div></div>
<button id="startBtn">出撃</button><button id="gachaBtn">ガチャ / 所持品</button><button id="upBtn">転生強化</button><button id="soundBtn">音 ON/OFF</button><button id="resetBtn">保存初期化</button></div></section>
<section id="gacha" class="screen"><header><button class="back">戻る</button><h2>ガチャ / 所持品</h2></header><p>スキン0.1% / UR0.5% / SSR1% / SR10% / R20% / 残りN</p><div class="point">Gold：<b id="gold2">0</b></div><div class="gachaBtns"><button id="roll1">1回 100G</button><button id="roll10">10回 1000G</button><button id="roll100">100回 10000G</button></div><div id="gachaLog" class="resultMini"></div><div id="inv" class="cards"></div></section>
<section id="upgrades" class="screen"><header><button class="back">戻る</button><h2>転生強化</h2></header><div class="point">所持転生pt：<b id="pts2">0</b></div><div id="upList" class="cards"></div></section>
<section id="game" class="screen game"><canvas id="cv"></canvas><div class="hud"><div><b>TIME</b><span id="time">0:00</span></div><div><b>LV</b><span id="lv">1</span></div><div><b>KILL</b><span id="kills">0</span></div><div><b>SCORE</b><span id="score">0</span></div><div><b>GOLD</b><span id="runGold">0</span></div></div><div class="hp"><i id="hpbar"></i></div><div class="xp"><i id="xpbar"></i></div><div id="buffs" class="buffs"></div><div id="hint">押した方向へ移動。壁と建物には当たり判定あり。</div><button id="pause">II</button></section>
<section id="levelup" class="overlay"><div class="modal"><h2>レベルアップ <span id="timer">3.0</span></h2><p>3秒で未選択ならランダム取得</p><div id="choices" class="choices"></div></div></section>
<section id="result" class="overlay"><div class="modal"><h2>リザルト</h2><div id="resultText"></div><button id="titleBack">タイトルへ</button></div></section>
<div id="err" class="err hidden"></div>
<script src="game.js"></script></body></html>
